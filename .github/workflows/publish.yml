name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # MinVer needs full history

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: |
          dotnet test tests/FileVault.Core.Tests --no-build --configuration Release
          dotnet test tests/FileVault.Local.Tests --no-build --configuration Release

      - name: Pack
        run: dotnet pack --no-build --configuration Release --output ./nupkgs

      - name: List packages
        run: ls -la ./nupkgs

      - name: Push to NuGet.org
        run: dotnet nuget push "./nupkgs/*.nupkg" --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
